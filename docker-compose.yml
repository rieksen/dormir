services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dormir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dormir}
      POSTGRES_DB: ${POSTGRES_DB:-dormir}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dormir} -d ${POSTGRES_DB:-dormir}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-dormir}:${POSTGRES_PASSWORD:-dormir}@db:5432/${POSTGRES_DB:-dormir}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      DEBUG: ${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
